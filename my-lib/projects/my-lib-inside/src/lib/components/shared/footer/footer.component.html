<footer>
  <div class="footer">
    <!-- Sezione Link -->
    <div class="row links">
      <ul>
        <li *ngFor="let link of footerLinkItems">
          <!-- Se è un link esterno, usa href -->
          <a *ngIf="link.external" [href]="link.path" target="_blank" rel="noopener noreferrer" class="footer__link">
            {{ link.label }}
          </a>
          <!-- Se è un link interno, usa routerLink -->
          <a *ngIf="!link.external" [routerLink]="link.path" class="footer__link">
            {{ link.label }}
          </a>
        </li>
      </ul>
    </div>

    <!-- Sezione Metodi di Pagamento (già a posto) -->
    <div class="row payment-methods">
      <ul>
        <li *ngFor="let method of footerPaymentMethodItems">
          <a [href]="method.url" target="_blank" rel="noopener noreferrer" class="footer__link">
            <i class="fab" [ngClass]="method.icon"></i> {{ method.name }}
          </a>
        </li>
      </ul>
    </div>
  </div>
</footer>
