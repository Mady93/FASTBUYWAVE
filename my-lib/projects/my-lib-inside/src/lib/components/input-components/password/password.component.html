<div class="form-field password-field" [class.invalid]="showError">
  <label *ngIf="label" [for]="name" class="form-label">
    {{ label }} <span *ngIf="required" class="required-marker">*</span>
  </label>

  <div class="input-container">
  <input [type]="showPassword ? 'text' : 'password'" 
    [id]="name" 
    [placeholder]="placeholder || ''" 
    [value]="value"
    [required]="required" 
    class="form-control password-input" 
    [class.is-invalid]="showError"
    (input)="onInput($event)" 
    (blur)="onBlur()" />
  <button type="button" class="toggle-password-visibility" (click)="togglePasswordVisibility()"
    [attr.aria-label]="showPassword ? 'Nascondi password' : 'Mostra password'">
    <span class="toggle-icon">{{ showPassword ? '👁️‍🗨️' : '👁️' }}</span>
  </button>
  <div *ngIf="showError" class="error-message">{{ getErrorMessage() }}</div>
  <div *ngIf="showPasswordStrength && value" class="password-strength">
      <div class="strength-meter">
        <div class="strength-segment" [class]="getStrengthClass(0)"></div>
        <div class="strength-segment" [class]="getStrengthClass(1)"></div>
        <div class="strength-segment" [class]="getStrengthClass(2)"></div>
        <div class="strength-segment" [class]="getStrengthClass(3)"></div>
      </div>
      <span class="strength-text">{{ strengthText }}</span>
    </div>
  </div>
</div>
