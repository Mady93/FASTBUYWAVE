# ============================================
# SWAGGER UI - DEVELOPMENT SETTINGS
# ============================================

# Enable Swagger UI web interface for API testing and documentation
springdoc.swagger-ui.enabled=true

# Enable OpenAPI JSON endpoint at /api-docs (machine-readable API spec)
springdoc.api-docs.enabled=true

# Collapse all API endpoints by default in Swagger UI (keeps interface clean)
springdoc.swagger-ui.doc-expansion=none


# ============================================
# ERROR HANDLING - DEVELOPMENT
# ============================================

# Include full stacktrace in error responses (helpful for debugging in development)
server.error.include-stacktrace=ALWAYS