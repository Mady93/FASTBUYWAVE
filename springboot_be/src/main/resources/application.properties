# ============================================
# ACTIVE PROFILE CONFIGURATION
# ============================================
# Set the active profile based on environment
# Options: dev (development), prod (production), staging (staging environment)
spring.profiles.active=dev
#spring.profiles.active=prod
#spring.profiles.active=staging

# Application name (used for service discovery and logging)
spring.application.name=springboot_be

# Import external secrets file (DO NOT commit to version control)
spring.config.import=classpath:application-secrets.properties


# ============================================
# JPA (HIBERNATE) CONFIGURATION
# ============================================
# Prevents lazy loading issues in web requests (best practice)
spring.jpa.open-in-view=false

# DDL mode: creates tables on startup and drops them on shutdown
# WARNING: All data will be lost on application restart!
#spring.jpa.hibernate.ddl-auto=create-drop

# Updates database schema automatically without dropping existing data
spring.jpa.properties.hibernate.hbm2ddl.auto=update

# Disables automatic foreign key constraint creation
spring.jpa.properties.hibernate.hbm2ddl.create-constraints=false

# Prints SQL queries to console log for debugging
spring.jpa.show-sql=true

# Database dialect (commented - auto-detected by Hibernate)
#spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Use system timezone for database operations
spring.jpa.properties.hibernate.jdbc.time_zone=Europe/Rome

# Disable detailed SQL logging with parameters (keeps logs clean)
spring.jpa.properties.hibernate.show_sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.use_sql_comments=false 


# ============================================
# SPRING BATCH CONFIGURATION
# ============================================
# Creates batch metadata tables automatically on startup
spring.batch.jdbc.initialize-schema=always

# Enable batch job execution on application startup
spring.batch.job.enabled=true 
# Alternative: spring.batch.job.enabled=embedded for in-memory database


# ============================================
# SQL INITIALIZATION
# ============================================
# Database platform for initialization scripts
spring.sql.init.platform=mysql


# ============================================
# LOGGING LEVELS
# ============================================
# Global log level
logging.level.root=INFO

# Spring Boot framework logging
logging.level.org.springframework=INFO
logging.level.org.springframework.boot=INFO
logging.level.org.springframework.boot.actuate=INFO

# Web layer logging (controllers and HTTP requests) - DEBUG for development
logging.level.org.springframework.web=DEBUG
logging.level.org.springframework.web.servlet=DEBUG

# Hibernate SQL logging - set to DEBUG to see generated queries
logging.level.hibernate=WARN

# Disable sensitive parameter logging (security best practice)
logging.level.org.springframework.web.filter.CommonsRequestLoggingFilter=OFF
logging.level.org.apache.tomcat.util.http.Parameters=OFF

# Path to Log4j2 configuration file
logging.config=classpath:log4j2.xml


# ============================================
# SERVER CONFIGURATION
# ============================================
# HTTP port the application listens on
server.port=8080

# Always include error messages in responses (helpful for debugging)
server.error.include-message=always
server.error.include-binding-errors=always

# Custom error endpoint path
server.error.path=/error

# Enable default error page (white label)
server.error.whitelabel.enabled=true

# Enable HTTP protocol
server.http.enabled=true

# Base context path (commented - uncomment to add prefix)
#server.servlet.context-path: /resource-server

# Reject HTTP headers with illegal characters (security)
server.tomcat.reject-illegal-header=true

# Maximum HTTP header size (prevents header-based attacks)
server.max-http-header-size=64KB

# ============================================
# SECURITY AUTO-CONFIGURATION EXCLUSIONS
# ============================================
# Prevent Spring Boot from auto-configuring default UserDetailsService
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration


# ============================================
# LIQUIBASE DATABASE MIGRATION
# ============================================
# Path to Liquibase changelog file
spring.liquibase.change-log=classpath:db/changelog/db.changelog-master.yaml

# Enable Liquibase execution on startup
spring.liquibase.enabled=true

# Apply contexts for all environments
spring.liquibase.contexts=dev,prod,staging

# Target schema for Liquibase migrations
spring.liquibase.default-schema=app_chat

# IMPORTANT: false = NEVER drop tables or data on startup
spring.liquibase.drop-first=false

# Optional settings:
# Clear checksums to force re-run of unchanged changesets (use with caution)
spring.liquibase.clear-checksums=true

# Override datasource for Liquibase only (commented - uses main datasource by default)

# only if different from main datasource
# spring.liquibase.url=

# only if different
# spring.liquibase.user=

 # only if different
# spring.liquibase.password=

# labels for changeset filtering
# spring.liquibase.labels=


# ============================================
# SWAGGER / OPENAPI DOCUMENTATION
# ============================================
# API documentation endpoint
springdoc.api-docs.path=/api-docs

# Swagger UI interface endpoint
springdoc.swagger-ui.path=/swagger-ui.html

# Enable "Try it out" feature in Swagger UI
springdoc.swagger-ui.try-it-out-enabled=true

# Sort operations by HTTP method (GET, POST, PUT, DELETE)
springdoc.swagger-ui.operations-sorter=method

# Sort tags alphabetically
springdoc.swagger-ui.tags-sorter=alpha

# Packages to scan for OpenAPI annotations
springdoc.packages-to-scan=com.mady.springboot_be.controllers, com.mady.springboot_be.controllers.dasboard, com.mady.springboot_be.controllers.cart_order_payment, com.mady.springboot_be.controllers.contact

# API endpoints pattern to include in documentation
springdoc.paths-to-match=/api/**