# ============================================
# SWAGGER/OPENAPI PRODUCTION SETTINGS
# ============================================

# Disables Swagger UI interface in production (prevents API documentation exposure)
springdoc.swagger-ui.enabled=false

# Disables OpenAPI JSON endpoint in production (removes /api-docs endpoint)
springdoc.api-docs.enabled=false


# ============================================
# ERROR HANDLING - PRODUCTION
# ============================================

# NEVER expose stack traces in production (security risk & information leak)
server.error.include-stacktrace=NEVER